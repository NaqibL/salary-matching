name: Daily Job Crawl (Part 1 — Segments 1-3)

on:
  schedule:
    # Run at 02:00 UTC every day (10:00 SGT)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      segment:
        description: 'Segment to run (1, 2, 3, or all)'
        required: false
        default: 'all'

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('pyproject.toml') }}
          restore-keys: hf-models-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Crawl segment 1
        if: ${{ github.event.inputs.segment == '1' || github.event.inputs.segment == 'all' || github.event.inputs.segment == '' }}
        run: |
          uv run mcf crawl-incremental --source mcf \
            --categories "Accounting / Auditing / Taxation,Admin / Secretarial,Advertising / Media,Architecture / Interior Design,Banking and Finance,Building and Construction,Consulting,Customer Service"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRAWL_WEBHOOK_URL: ${{ secrets.CRAWL_WEBHOOK_URL }}

      - name: Crawl segment 2
        if: ${{ github.event.inputs.segment == '2' || github.event.inputs.segment == 'all' || github.event.inputs.segment == '' }}
        run: |
          uv run mcf crawl-incremental --source mcf \
            --categories "Design,Education and Training,Engineering,Entertainment,Environment / Health,Events / Promotions,F&B,General Management,General Work"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRAWL_WEBHOOK_URL: ${{ secrets.CRAWL_WEBHOOK_URL }}

      - name: Crawl segment 3
        if: ${{ github.event.inputs.segment == '3' || github.event.inputs.segment == 'all' || github.event.inputs.segment == '' }}
        run: |
          uv run mcf crawl-incremental --source mcf \
            --categories "Healthcare / Pharmaceutical,Hospitality,Human Resources,Information Technology,Insurance,Legal,Logistics / Supply Chain,Manufacturing"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          CRAWL_WEBHOOK_URL: ${{ secrets.CRAWL_WEBHOOK_URL }}

      - name: Print summary
        if: always()
        run: echo "Crawl (Part 1) finished at $(date -u)"
