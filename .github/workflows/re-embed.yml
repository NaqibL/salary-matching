name: Re-embed Jobs

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Embedding batch size (default: 32)'
        required: false
        default: '32'

jobs:
  re-embed:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-${{ hashFiles('pyproject.toml') }}
          restore-keys: hf-models-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Re-embed all active jobs
        run: |
          BATCH="${{ github.event.inputs.batch_size || '32' }}"
          uv run mcf re-embed --db-url "$DATABASE_URL" --batch-size "$BATCH"
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Rebuild HNSW indexes
        run: |
          psql "$DATABASE_URL" <<'SQL'
            CREATE INDEX IF NOT EXISTS idx_job_embeddings_vector
              ON job_embeddings
              USING hnsw (embedding vector_cosine_ops);

            CREATE INDEX IF NOT EXISTS idx_candidate_embeddings_vector
              ON candidate_embeddings
              USING hnsw (embedding vector_cosine_ops);
          SQL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Print summary
        if: always()
        run: echo "Re-embed finished at $(date -u)"
